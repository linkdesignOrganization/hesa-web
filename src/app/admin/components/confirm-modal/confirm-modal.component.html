<!-- Confirm Modal (DC-079, DC-133, DC-134, DC-135) -->
@if (isOpen()) {
  <div class="adm-modal-backdrop" (click)="close()">
    <div class="adm-modal adm-modal--confirm" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="adm-modal__body">
        <div class="adm-modal__icon"
             [class.adm-modal__icon--danger]="variant() === 'danger'"
             [class.adm-modal__icon--warning]="variant() === 'warning'">
          <span class="material-symbols-outlined">warning</span>
        </div>
        <h2 id="modal-title" class="adm-modal__title">{{ title() }}</h2>
        <p class="adm-modal__desc">{{ getDescription() }}</p>
      </div>
      <div class="adm-modal__footer">
        <button class="adm-btn adm-btn--secondary" (click)="close()" autofocus>{{ cancelLabel() }}</button>
        @if (variant() === 'danger') {
          <button class="adm-btn adm-btn--danger" (click)="confirm()">{{ getConfirmText() }}</button>
        } @else {
          <button class="adm-btn adm-btn--primary" (click)="confirm()">{{ getConfirmText() }}</button>
        }
      </div>
    </div>
  </div>
}
