<!-- ADMIN LOGIN (DC-045, DC-099, DC-114, DC-115) -->
<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo" aria-label="HESA">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="var(--adm-primary)" role="img" aria-hidden="true">
        <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle"
              font-family="Inter, system-ui, sans-serif" font-size="44" font-weight="800"
              letter-spacing="-0.02em">HESA</text>
      </svg>
    </div>

    <h1 class="login-card__title">Panel de Administraci&oacute;n</h1>
    <p class="login-card__subtitle">Inicia sesi&oacute;n con tu cuenta Microsoft</p>

    @if (isLoading() && !loginError()) {
      <div class="login-card__loading">
        <span class="adm-spinner adm-spinner--lg"></span>
        <p>Iniciando sesi&oacute;n...</p>
      </div>
    } @else {
      <button class="login-card__btn" (click)="onLogin()" [disabled]="isLoading()">
        <svg width="20" height="20" viewBox="0 0 21 21" fill="none" aria-hidden="true">
          <path d="M0 0h10v10H0z" fill="#F25022"/>
          <path d="M11 0h10v10H11z" fill="#7FBA00"/>
          <path d="M0 11h10v10H0z" fill="#00A4EF"/>
          <path d="M11 11h10v10H11z" fill="#FFB900"/>
        </svg>
        Iniciar sesi&oacute;n con Microsoft
      </button>
    }

    <!-- Error state (DC-115, REQ-310) -->
    @if (loginError()) {
      <div class="login-card__error">
        <span class="material-symbols-outlined login-card__error-icon">error</span>
        <p>{{ errorMessage() }}</p>
        <button class="adm-btn adm-btn--primary adm-btn--sm" (click)="onLogin()">
          <span class="material-symbols-outlined">refresh</span>
          Reintentar
        </button>
      </div>
    }
  </div>
</div>
