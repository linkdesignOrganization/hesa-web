<!-- ADMIN LOGIN (DC-045, DC-099, DC-114, DC-115) -->
<div class="login-page">
  <div class="login-card">
    <div class="login-card__logo">HESA</div>
    <h1 class="login-card__title">Panel de Administracion</h1>
    <p class="login-card__subtitle">Inicia sesion con tu cuenta de Microsoft</p>
    <button class="login-card__btn" (click)="onLogin()" [disabled]="isLoading()">
      @if (isLoading()) {
        <span class="spinner-sm"></span>
        Iniciando sesion...
      } @else {
        <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
          <path d="M0 0h10v10H0z" fill="#F25022"/>
          <path d="M11 0h10v10H11z" fill="#7FBA00"/>
          <path d="M0 11h10v10H0z" fill="#00A4EF"/>
          <path d="M11 11h10v10H11z" fill="#FFB900"/>
        </svg>
        Iniciar sesion con Microsoft
      }
    </button>
    <!-- Error state (DC-115) -->
    @if (loginError()) {
      <div class="login-card__error">
        <p>No tienes acceso al panel de administracion</p>
        <button class="login-card__retry" (click)="onLogin()">Reintentar</button>
      </div>
    }
  </div>
</div>
