<!-- Toast container (DC-123 to DC-127) -->
<div class="toast-container" aria-live="polite" aria-atomic="true">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast"
         [class.toast--success]="toast.type === 'success'"
         [class.toast--error]="toast.type === 'error'"
         [class.toast--warning]="toast.type === 'warning'"
         [class.toast--info]="toast.type === 'info'"
         role="alert">
      <span class="toast__icon material-symbols-outlined">
        @if (toast.type === 'success') { check_circle }
        @if (toast.type === 'error') { error }
        @if (toast.type === 'warning') { warning }
        @if (toast.type === 'info') { info }
      </span>
      <span class="toast__text">{{ toast.message }}</span>
      <button class="toast__close" (click)="toastService.dismiss(toast.id)" aria-label="Cerrar notificacion">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  }
</div>
