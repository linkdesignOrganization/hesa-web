<section
  class="cat-block fade-in-section"
  [class.cat-block--pharma]="category() === 'pharma'"
  [class.cat-block--food]="category() === 'food'"
  [class.cat-block--equipment]="category() === 'equipment'"
  [class.cat-block--img-left]="imagePosition() === 'left'">
  <div class="cat-block__content">
    <h2 class="cat-block__title">{{ title() }}</h2>
    <p class="cat-block__desc">{{ description() }}</p>
    <ul class="cat-block__benefits">
      @for (benefit of benefits(); track benefit) {
        <li class="cat-block__benefit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brand-secondary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          <span>{{ benefit }}</span>
        </li>
      }
    </ul>
    <a [routerLink]="ctaLink()" class="btn btn-outline cat-block__cta">{{ ctaText() }}</a>
  </div>
  <div class="cat-block__image">
    <div class="cat-block__image-visual" [attr.data-category]="category()">
      @if (category() === 'pharma') {
        <svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">
          <rect width="400" height="300" rx="16" fill="rgba(0,141,201,0.06)"/>
          <!-- Shelf with medicine bottles -->
          <rect x="40" y="220" width="320" height="4" rx="2" fill="rgba(0,141,201,0.15)"/>
          <!-- Large bottle -->
          <g transform="translate(60,80)">
            <rect x="0" y="20" width="50" height="120" rx="8" fill="rgba(0,141,201,0.18)" stroke="rgba(0,141,201,0.35)" stroke-width="2"/>
            <rect x="10" y="0" width="30" height="24" rx="4" fill="rgba(0,141,201,0.25)"/>
            <rect x="5" y="30" width="40" height="18" rx="3" fill="rgba(0,141,201,0.28)"/>
            <rect x="8" y="55" width="34" height="2.5" rx="1.25" fill="rgba(0,141,201,0.2)"/>
            <rect x="8" y="62" width="24" height="2" rx="1" fill="rgba(0,141,201,0.12)"/>
            <circle cx="25" cy="100" r="12" fill="none" stroke="rgba(80,185,42,0.45)" stroke-width="2.5"/>
            <path d="M20 100L24 104L32 96" stroke="rgba(80,185,42,0.45)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <!-- Medium bottle -->
          <g transform="translate(140,120)">
            <rect x="0" y="15" width="40" height="85" rx="6" fill="rgba(0,90,133,0.15)" stroke="rgba(0,90,133,0.3)" stroke-width="1.5"/>
            <rect x="8" y="0" width="24" height="18" rx="3" fill="rgba(0,90,133,0.2)"/>
            <rect x="4" y="25" width="32" height="14" rx="2" fill="rgba(0,90,133,0.22)"/>
            <rect x="6" y="45" width="28" height="2" rx="1" fill="rgba(0,90,133,0.15)"/>
            <rect x="6" y="50" width="18" height="2" rx="1" fill="rgba(0,90,133,0.1)"/>
          </g>
          <!-- Syringe -->
          <g transform="translate(210,110) rotate(-15)">
            <rect x="0" y="8" width="100" height="14" rx="3" fill="rgba(0,141,201,0.12)" stroke="rgba(0,141,201,0.25)" stroke-width="1.5"/>
            <rect x="90" y="4" width="8" height="22" rx="2" fill="rgba(0,141,201,0.2)"/>
            <line x1="-15" y1="15" x2="0" y2="15" stroke="rgba(0,141,201,0.3)" stroke-width="2" stroke-linecap="round"/>
            <rect x="10" y="11" width="60" height="8" rx="2" fill="rgba(80,185,42,0.15)"/>
            <line x1="25" y1="8" x2="25" y2="22" stroke="rgba(0,141,201,0.15)" stroke-width="0.5"/>
            <line x1="45" y1="8" x2="45" y2="22" stroke="rgba(0,141,201,0.15)" stroke-width="0.5"/>
            <line x1="65" y1="8" x2="65" y2="22" stroke="rgba(0,141,201,0.15)" stroke-width="0.5"/>
          </g>
          <!-- Pills -->
          <g transform="translate(280,160)">
            <ellipse cx="15" cy="8" rx="15" ry="8" fill="rgba(80,185,42,0.25)"/>
            <ellipse cx="15" cy="8" rx="15" ry="8" fill="none" stroke="rgba(80,185,42,0.4)" stroke-width="1"/>
            <line x1="15" y1="0" x2="15" y2="16" stroke="rgba(80,185,42,0.3)" stroke-width="0.5"/>
          </g>
          <g transform="translate(310,175)">
            <ellipse cx="12" cy="6" rx="12" ry="6" fill="rgba(0,141,201,0.2)"/>
            <line x1="12" y1="0" x2="12" y2="12" stroke="rgba(0,141,201,0.25)" stroke-width="0.5"/>
          </g>
          <g transform="translate(260,185)">
            <ellipse cx="10" cy="5" rx="10" ry="5" fill="rgba(80,185,42,0.18)"/>
          </g>
          <!-- Medical cross -->
          <g transform="translate(320,50)" opacity="0.3">
            <rect x="10" y="0" width="10" height="30" rx="2" fill="rgba(0,141,201,0.4)"/>
            <rect x="0" y="10" width="30" height="10" rx="2" fill="rgba(0,141,201,0.4)"/>
          </g>
          <!-- Decorative circles -->
          <circle cx="350" cy="250" r="20" fill="rgba(80,185,42,0.06)"/>
          <circle cx="30" cy="50" r="15" fill="rgba(0,141,201,0.06)"/>
        </svg>
      } @else if (category() === 'food') {
        <svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">
          <rect width="400" height="300" rx="16" fill="rgba(80,185,42,0.05)"/>
          <!-- Large bag -->
          <g transform="translate(50,40)">
            <path d="M20 30 L20 220 Q20 240 40 240 L100 240 Q120 240 120 220 L120 30 Q120 10 100 10 L40 10 Q20 10 20 30Z" fill="rgba(80,185,42,0.14)" stroke="rgba(80,185,42,0.3)" stroke-width="2"/>
            <rect x="30" y="20" width="80" height="40" rx="6" fill="rgba(80,185,42,0.2)"/>
            <!-- Brand area -->
            <rect x="35" y="70" width="70" height="4" rx="2" fill="rgba(80,185,42,0.18)"/>
            <rect x="35" y="78" width="50" height="3" rx="1.5" fill="rgba(80,185,42,0.12)"/>
            <rect x="35" y="85" width="60" height="3" rx="1.5" fill="rgba(80,185,42,0.1)"/>
            <!-- Dog silhouette on bag -->
            <g transform="translate(40,110)">
              <ellipse cx="30" cy="30" rx="22" ry="18" fill="rgba(139,92,42,0.2)"/>
              <ellipse cx="12" cy="18" rx="10" ry="12" fill="rgba(139,92,42,0.18)"/>
              <ellipse cx="5" cy="10" rx="4" ry="8" fill="rgba(139,92,42,0.15)" transform="rotate(-20 5 10)"/>
              <ellipse cx="16" cy="7" rx="3.5" ry="7" fill="rgba(139,92,42,0.15)" transform="rotate(10 16 7)"/>
              <circle cx="9" cy="16" r="2" fill="rgba(139,92,42,0.35)"/>
              <circle cx="6" cy="22" r="3" fill="rgba(139,92,42,0.3)"/>
            </g>
            <!-- Weight label -->
            <rect x="30" y="200" width="80" height="20" rx="4" fill="rgba(80,185,42,0.15)"/>
            <rect x="40" y="206" width="40" height="3" rx="1.5" fill="rgba(80,185,42,0.25)"/>
          </g>
          <!-- Food bowl -->
          <g transform="translate(220,170)">
            <ellipse cx="60" cy="70" rx="60" ry="25" fill="rgba(139,92,42,0.12)" stroke="rgba(139,92,42,0.25)" stroke-width="2"/>
            <ellipse cx="60" cy="55" rx="55" ry="18" fill="rgba(80,185,42,0.08)"/>
            <ellipse cx="60" cy="50" rx="50" ry="12" fill="rgba(139,92,42,0.06)"/>
            <!-- Kibble pieces -->
            <circle cx="45" cy="45" r="5" fill="rgba(139,92,42,0.25)"/>
            <circle cx="60" cy="42" r="4.5" fill="rgba(139,92,42,0.22)"/>
            <circle cx="75" cy="44" r="5" fill="rgba(139,92,42,0.2)"/>
            <circle cx="52" cy="38" r="3.5" fill="rgba(139,92,42,0.18)"/>
            <circle cx="68" cy="37" r="4" fill="rgba(139,92,42,0.2)"/>
            <circle cx="55" cy="50" r="3" fill="rgba(139,92,42,0.15)"/>
            <circle cx="65" cy="48" r="3.5" fill="rgba(139,92,42,0.18)"/>
          </g>
          <!-- Small can -->
          <g transform="translate(280,80)">
            <rect x="0" y="5" width="50" height="60" rx="6" fill="rgba(80,185,42,0.12)" stroke="rgba(80,185,42,0.25)" stroke-width="1.5"/>
            <rect x="0" y="0" width="50" height="10" rx="4" fill="rgba(80,185,42,0.18)"/>
            <rect x="6" y="20" width="38" height="12" rx="2" fill="rgba(80,185,42,0.15)"/>
            <rect x="8" y="38" width="34" height="2" rx="1" fill="rgba(80,185,42,0.1)"/>
            <rect x="8" y="43" width="24" height="2" rx="1" fill="rgba(80,185,42,0.08)"/>
          </g>
          <!-- Paw print -->
          <g transform="translate(350,40)" opacity="0.15">
            <circle cx="15" cy="20" r="10" fill="rgba(139,92,42,0.5)"/>
            <circle cx="5" cy="8" r="5" fill="rgba(139,92,42,0.5)"/>
            <circle cx="25" cy="8" r="5" fill="rgba(139,92,42,0.5)"/>
            <circle cx="0" cy="18" r="4" fill="rgba(139,92,42,0.5)"/>
            <circle cx="30" cy="18" r="4" fill="rgba(139,92,42,0.5)"/>
          </g>
          <!-- Decorative leaf -->
          <g transform="translate(200,30)" opacity="0.2">
            <path d="M0 20 Q10 0 30 5 Q20 15 25 30 Q10 25 0 20Z" fill="rgba(80,185,42,0.5)"/>
            <line x1="5" y1="18" x2="25" y2="12" stroke="rgba(80,185,42,0.3)" stroke-width="0.5"/>
          </g>
        </svg>
      } @else {
        <svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">
          <rect width="400" height="300" rx="16" fill="rgba(124,58,237,0.04)"/>
          <!-- Microscope -->
          <g transform="translate(60,50)">
            <!-- Base -->
            <rect x="20" y="200" width="80" height="12" rx="4" fill="rgba(124,58,237,0.18)" stroke="rgba(124,58,237,0.3)" stroke-width="1.5"/>
            <!-- Column -->
            <rect x="50" y="60" width="14" height="145" rx="3" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.25)" stroke-width="1.5"/>
            <!-- Arm -->
            <path d="M57 60 L57 45 Q57 35 67 35 L100 35 Q110 35 110 45 L110 70" stroke="rgba(124,58,237,0.3)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <!-- Eyepiece -->
            <rect x="45" y="28" width="24" height="18" rx="4" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.35)" stroke-width="1.5"/>
            <rect x="50" y="18" width="14" height="14" rx="7" fill="rgba(124,58,237,0.25)"/>
            <!-- Objective -->
            <rect x="100" y="65" width="16" height="40" rx="3" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.25)" stroke-width="1.5"/>
            <rect x="102" y="100" width="12" height="20" rx="2" fill="rgba(124,58,237,0.2)"/>
            <!-- Stage -->
            <rect x="80" y="125" width="60" height="8" rx="2" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
            <!-- Focus knob -->
            <circle cx="45" cy="140" r="10" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.2)" stroke-width="1.5"/>
            <!-- Slide -->
            <rect x="90" y="118" width="30" height="8" rx="1" fill="rgba(0,141,201,0.15)" stroke="rgba(0,141,201,0.2)" stroke-width="0.5"/>
          </g>
          <!-- Stethoscope -->
          <g transform="translate(220,60)">
            <path d="M40 0 Q20 0 15 30 Q10 60 30 80 Q50 100 50 140" stroke="rgba(0,141,201,0.25)" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M80 0 Q100 0 105 30 Q110 60 90 80 Q70 100 70 140" stroke="rgba(0,141,201,0.25)" stroke-width="4" fill="none" stroke-linecap="round"/>
            <path d="M50 140 Q50 160 60 160 Q70 160 70 140" stroke="rgba(0,141,201,0.25)" stroke-width="4" fill="none"/>
            <circle cx="60" cy="170" r="16" fill="none" stroke="rgba(0,141,201,0.3)" stroke-width="3"/>
            <circle cx="60" cy="170" r="7" fill="rgba(0,141,201,0.15)"/>
            <!-- Ear tips -->
            <circle cx="40" cy="0" r="4" fill="rgba(0,141,201,0.2)"/>
            <circle cx="80" cy="0" r="4" fill="rgba(0,141,201,0.2)"/>
          </g>
          <!-- Scalpel -->
          <g transform="translate(280,180) rotate(-30)">
            <rect x="0" y="4" width="80" height="6" rx="2" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
            <path d="M80 0 L100 7 L80 14 Z" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
          </g>
          <!-- Clipboard -->
          <g transform="translate(300,40)">
            <rect x="0" y="10" width="60" height="80" rx="4" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.18)" stroke-width="1.5"/>
            <rect x="15" y="2" width="30" height="14" rx="3" fill="rgba(124,58,237,0.15)"/>
            <rect x="8" y="28" width="44" height="2.5" rx="1.25" fill="rgba(124,58,237,0.12)"/>
            <rect x="8" y="36" width="36" height="2" rx="1" fill="rgba(124,58,237,0.08)"/>
            <rect x="8" y="44" width="40" height="2" rx="1" fill="rgba(124,58,237,0.08)"/>
            <rect x="8" y="56" width="14" height="14" rx="2" fill="rgba(80,185,42,0.12)" stroke="rgba(80,185,42,0.2)" stroke-width="1"/>
            <path d="M11 63L15 67L21 59" stroke="rgba(80,185,42,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <!-- Decorative -->
          <circle cx="380" cy="280" r="15" fill="rgba(124,58,237,0.04)"/>
          <circle cx="20" cy="30" r="10" fill="rgba(0,141,201,0.05)"/>
        </svg>
      }
    </div>
  </div>
</section>
