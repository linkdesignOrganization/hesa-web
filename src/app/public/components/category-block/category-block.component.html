<section
  class="cat-block fade-in-section"
  [class.cat-block--pharma]="category() === 'pharma'"
  [class.cat-block--food]="category() === 'food'"
  [class.cat-block--equipment]="category() === 'equipment'"
  [class.cat-block--img-left]="imagePosition() === 'left'">
  <div class="cat-block__content">
    <h2 class="cat-block__title">{{ title() }}</h2>
    <p class="cat-block__desc">{{ description() }}</p>
    <ul class="cat-block__benefits">
      @for (benefit of benefits(); track benefit) {
        <li class="cat-block__benefit">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brand-secondary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          <span>{{ benefit }}</span>
        </li>
      }
    </ul>
    <a [routerLink]="ctaLink()" class="btn btn-outline cat-block__cta" (click)="trackCTA()">{{ ctaText() }}</a>
  </div>
  <div class="cat-block__image">
    <div class="cat-block__image-visual" [attr.data-category]="category()">
      @if (category() === 'pharma') {
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="200" height="200" rx="16" fill="rgba(0,141,201,0.08)"/>
          <g transform="translate(50,40)">
            <rect x="30" y="10" width="40" height="80" rx="8" fill="rgba(0,141,201,0.2)" stroke="rgba(0,141,201,0.4)" stroke-width="2"/>
            <rect x="35" y="15" width="30" height="20" rx="4" fill="rgba(0,141,201,0.3)"/>
            <rect x="35" y="40" width="30" height="3" rx="1.5" fill="rgba(0,141,201,0.25)"/>
            <rect x="35" y="47" width="20" height="3" rx="1.5" fill="rgba(0,141,201,0.15)"/>
            <circle cx="50" cy="65" r="8" fill="none" stroke="rgba(80,185,42,0.5)" stroke-width="2"/>
            <path d="M46 65 L49 68 L55 62" stroke="rgba(80,185,42,0.5)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <circle cx="140" cy="140" r="25" fill="rgba(80,185,42,0.1)" stroke="rgba(80,185,42,0.2)" stroke-width="1.5"/>
          <circle cx="40" cy="150" r="15" fill="rgba(0,141,201,0.08)"/>
        </svg>
      } @else if (category() === 'food') {
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="200" height="200" rx="16" fill="rgba(80,185,42,0.08)"/>
          <g transform="translate(40,30)">
            <ellipse cx="60" cy="90" rx="45" ry="35" fill="rgba(80,185,42,0.15)" stroke="rgba(80,185,42,0.3)" stroke-width="2"/>
            <ellipse cx="60" cy="82" rx="45" ry="10" fill="rgba(80,185,42,0.1)"/>
            <circle cx="50" cy="75" r="5" fill="rgba(139,92,42,0.3)"/>
            <circle cx="65" cy="72" r="4" fill="rgba(139,92,42,0.25)"/>
            <circle cx="75" cy="78" r="3.5" fill="rgba(139,92,42,0.2)"/>
            <circle cx="55" cy="68" r="3" fill="rgba(139,92,42,0.2)"/>
            <path d="M30 50 Q60 20 90 50" stroke="rgba(80,185,42,0.3)" stroke-width="2" fill="none"/>
          </g>
          <circle cx="150" cy="40" r="20" fill="rgba(80,185,42,0.08)"/>
          <circle cx="30" cy="160" r="12" fill="rgba(0,141,201,0.06)"/>
        </svg>
      } @else {
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="200" height="200" rx="16" fill="rgba(124,58,237,0.06)"/>
          <g transform="translate(50,35)">
            <rect x="20" y="30" width="60" height="70" rx="6" fill="rgba(124,58,237,0.12)" stroke="rgba(124,58,237,0.25)" stroke-width="2"/>
            <circle cx="50" cy="55" r="15" fill="none" stroke="rgba(124,58,237,0.3)" stroke-width="2"/>
            <circle cx="50" cy="55" r="6" fill="rgba(124,58,237,0.15)"/>
            <rect x="35" y="80" width="30" height="4" rx="2" fill="rgba(124,58,237,0.15)"/>
            <rect x="40" y="88" width="20" height="3" rx="1.5" fill="rgba(124,58,237,0.1)"/>
            <rect x="30" y="15" width="40" height="18" rx="4" fill="rgba(0,141,201,0.1)" stroke="rgba(0,141,201,0.2)" stroke-width="1.5"/>
          </g>
          <circle cx="155" cy="155" r="18" fill="rgba(0,141,201,0.06)"/>
          <circle cx="35" cy="45" r="10" fill="rgba(124,58,237,0.05)"/>
        </svg>
      }
    </div>
  </div>
</section>
