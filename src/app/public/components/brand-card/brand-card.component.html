<a [class]="cardClass" [routerLink]="brandLink" [attr.aria-label]="'Ver marca ' + displayName">
  <div class="brand-card__logo-wrapper">
    @if (logoUrl) {
      <img class="brand-card__logo-img" [src]="logoUrl" [alt]="displayName + ' logo'" loading="lazy" />
    } @else {
      <span class="brand-card__logo-initial">{{ logoInitial }}</span>
    }
  </div>

  <div class="brand-card__info">
    <h3 class="brand-card__name">{{ displayName }}</h3>

    <p class="brand-card__country">
      <svg class="brand-card__country-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      {{ displayCountry }}
    </p>

    @if (displayCategoryBadges.length) {
      <div class="brand-card__badges">
        @for (cat of displayCategoryBadges; track cat.label) {
          <span
            class="badge"
            [class.badge-pharma]="cat.key === 'farmacos'"
            [class.badge-food]="cat.key === 'alimentos'"
            [class.badge-equipment]="cat.key === 'equipos'">{{ cat.label }}</span>
        }
      </div>
    }
  </div>
</a>
