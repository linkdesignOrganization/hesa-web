<!-- Desktop Filter Bar (DC-056, DC-087) -->
<div class="filter-bar">
  <div class="filter-bar__dropdowns">
    <button class="filter-bar__dropdown" type="button">
      <span class="filter-bar__dropdown-label">Categoría</span>
      <svg class="filter-bar__dropdown-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <button class="filter-bar__dropdown" type="button">
      <span class="filter-bar__dropdown-label">Marca</span>
      <svg class="filter-bar__dropdown-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
    <button class="filter-bar__dropdown" type="button">
      <span class="filter-bar__dropdown-label">Especie</span>
      <svg class="filter-bar__dropdown-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </button>
  </div>
  <span class="filter-bar__count">96 productos</span>
</div>

<!-- Active filter pills -->
<div class="filter-bar__pills" style="display: none;">
  <span class="filter-bar__pill">
    <span class="filter-bar__pill-text">Zoetis</span>
    <button class="filter-bar__pill-remove" type="button" aria-label="Remover filtro: Zoetis">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </span>
  <button class="filter-bar__clear" type="button">Limpiar filtros</button>
</div>

<!-- Mobile filter button (DC-087) -->
<div class="filter-bar__mobile">
  <button class="filter-bar__mobile-btn" type="button">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <line x1="4" y1="6" x2="20" y2="6"/>
      <line x1="6" y1="12" x2="18" y2="12"/>
      <line x1="8" y1="18" x2="16" y2="18"/>
    </svg>
    <span class="filter-bar__mobile-label">Filtrar</span>
    <!-- Count badge (shown when filters are active) -->
    <!--<span class="filter-bar__mobile-badge">2</span>-->
  </button>
</div>
