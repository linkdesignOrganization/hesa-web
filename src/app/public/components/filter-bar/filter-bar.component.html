<!-- Desktop Filter Bar (DC-056, DC-087) -->
<div class="filter-bar">
  <div class="filter-bar__dropdowns">
    <button class="filter-bar__dropdown">
      Categoria
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="filter-bar__dropdown">
      Marca
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="filter-bar__dropdown">
      Especie
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>
  <span class="filter-bar__count">96 productos</span>
</div>

<!-- Active filter pills -->
<div class="filter-bar__pills" style="display: none;">
  <span class="filter-bar__pill">
    Zoetis
    <button class="filter-bar__pill-remove" aria-label="Remover filtro: Zoetis">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </span>
  <button class="filter-bar__clear">Limpiar filtros</button>
</div>

<!-- Mobile filter button (DC-087) -->
<div class="filter-bar__mobile">
  <button class="filter-bar__mobile-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    Filtrar
  </button>
</div>
