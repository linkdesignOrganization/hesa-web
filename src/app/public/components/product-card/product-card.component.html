<a class="product-card" [class.product-card--carousel]="variant() === 'carousel'" [routerLink]="productLink" [attr.aria-label]="'Ver ' + displayName">
  <div class="product-card__image" [attr.data-category]="productCategory">
    @if (productImage) {
      <picture>
        <source [srcset]="productImageWebP" type="image/webp">
        <img [src]="productImage" [alt]="displayName || 'Producto'" class="product-card__image-real" loading="lazy">
      </picture>
    }
    <div class="product-card__image-visual" [class.product-card__image-visual--hidden]="!!productImage">
      @if (productCategory === 'farmacos') {
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="200" height="200" rx="12" fill="rgba(0,141,201,0.06)"/>
          <!-- Medicine bottle -->
          <g transform="translate(55,20)">
            <rect x="15" y="25" width="60" height="120" rx="10" fill="rgba(0,141,201,0.15)" stroke="rgba(0,141,201,0.3)" stroke-width="2"/>
            <rect x="25" y="5" width="40" height="25" rx="5" fill="rgba(0,141,201,0.22)"/>
            <rect x="20" y="35" width="50" height="22" rx="4" fill="rgba(0,141,201,0.25)"/>
            <rect x="24" y="65" width="42" height="3" rx="1.5" fill="rgba(0,141,201,0.18)"/>
            <rect x="24" y="72" width="30" height="2.5" rx="1.25" fill="rgba(0,141,201,0.12)"/>
            <rect x="24" y="78" width="35" height="2.5" rx="1.25" fill="rgba(0,141,201,0.1)"/>
            <circle cx="45" cy="110" r="14" fill="none" stroke="rgba(80,185,42,0.4)" stroke-width="2.5"/>
            <path d="M39 110L43 114L52 105" stroke="rgba(80,185,42,0.4)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
          <!-- Medical cross -->
          <g transform="translate(145,25)" opacity="0.2">
            <rect x="8" y="0" width="8" height="24" rx="2" fill="rgba(0,141,201,0.5)"/>
            <rect x="0" y="8" width="24" height="8" rx="2" fill="rgba(0,141,201,0.5)"/>
          </g>
          <circle cx="30" cy="170" r="10" fill="rgba(0,141,201,0.06)"/>
          <circle cx="170" cy="160" r="14" fill="rgba(80,185,42,0.06)"/>
        </svg>
      } @else if (productCategory === 'alimentos') {
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="200" height="200" rx="12" fill="rgba(80,185,42,0.05)"/>
          <!-- Food bag -->
          <g transform="translate(45,15)">
            <path d="M15 25 L15 155 Q15 170 30 170 L80 170 Q95 170 95 155 L95 25 Q95 10 80 10 L30 10 Q15 10 15 25Z" fill="rgba(80,185,42,0.12)" stroke="rgba(80,185,42,0.28)" stroke-width="2"/>
            <rect x="22" y="18" width="66" height="32" rx="5" fill="rgba(80,185,42,0.18)"/>
            <rect x="26" y="58" width="58" height="3" rx="1.5" fill="rgba(80,185,42,0.16)"/>
            <rect x="26" y="65" width="42" height="2.5" rx="1.25" fill="rgba(80,185,42,0.1)"/>
            <rect x="26" y="72" width="48" height="2.5" rx="1.25" fill="rgba(80,185,42,0.08)"/>
            <!-- Pet silhouette on bag -->
            <g transform="translate(25,90)">
              <ellipse cx="30" cy="22" rx="18" ry="14" fill="rgba(139,92,42,0.18)"/>
              <ellipse cx="15" cy="12" rx="9" ry="10" fill="rgba(139,92,42,0.15)"/>
              <ellipse cx="9" cy="4" rx="3.5" ry="7" fill="rgba(139,92,42,0.12)" transform="rotate(-15 9 4)"/>
              <ellipse cx="18" cy="3" rx="3" ry="6" fill="rgba(139,92,42,0.12)" transform="rotate(10 18 3)"/>
              <circle cx="12" cy="11" r="2" fill="rgba(139,92,42,0.3)"/>
            </g>
            <rect x="22" y="140" width="66" height="16" rx="3" fill="rgba(80,185,42,0.12)"/>
            <rect x="30" y="145" width="32" height="3" rx="1.5" fill="rgba(80,185,42,0.2)"/>
          </g>
          <!-- Paw -->
          <g transform="translate(155,150)" opacity="0.12">
            <circle cx="10" cy="15" r="7" fill="rgba(139,92,42,0.5)"/>
            <circle cx="3" cy="5" r="3.5" fill="rgba(139,92,42,0.5)"/>
            <circle cx="17" cy="5" r="3.5" fill="rgba(139,92,42,0.5)"/>
            <circle cx="0" cy="12" r="2.5" fill="rgba(139,92,42,0.5)"/>
            <circle cx="20" cy="12" r="2.5" fill="rgba(139,92,42,0.5)"/>
          </g>
        </svg>
      } @else {
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="200" height="200" rx="12" fill="rgba(124,58,237,0.04)"/>
          <!-- Equipment icon -->
          <g transform="translate(45,30)">
            <rect x="20" y="30" width="70" height="90" rx="8" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.22)" stroke-width="2"/>
            <circle cx="55" cy="65" r="20" fill="none" stroke="rgba(124,58,237,0.28)" stroke-width="2.5"/>
            <circle cx="55" cy="65" r="8" fill="rgba(124,58,237,0.12)"/>
            <rect x="35" y="95" width="40" height="3.5" rx="1.75" fill="rgba(124,58,237,0.12)"/>
            <rect x="40" y="102" width="30" height="2.5" rx="1.25" fill="rgba(124,58,237,0.08)"/>
            <rect x="30" y="15" width="50" height="20" rx="5" fill="rgba(0,141,201,0.1)" stroke="rgba(0,141,201,0.18)" stroke-width="1.5"/>
            <rect x="36" y="20" width="16" height="3" rx="1.5" fill="rgba(0,141,201,0.15)"/>
            <circle cx="68" cy="25" r="4" fill="rgba(80,185,42,0.2)"/>
          </g>
          <circle cx="160" cy="160" r="14" fill="rgba(0,141,201,0.05)"/>
          <circle cx="30" cy="40" r="8" fill="rgba(124,58,237,0.04)"/>
        </svg>
      }
    </div>
  </div>
  <div class="product-card__info">
    <h3 class="product-card__name">{{ displayName }}</h3>
    <p class="product-card__brand">{{ displayBrand }}</p>
    <span class="product-card__cta btn btn-outline btn-sm">{{ i18n.currentLang() === 'es' ? 'Ver producto' : 'View product' }}</span>
  </div>
</a>
