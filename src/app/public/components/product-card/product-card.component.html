<a class="product-card" [class.product-card--carousel]="variant() === 'carousel'" [routerLink]="productLink" [attr.aria-label]="'Ver ' + displayName">
  <div class="product-card__image">
    <div class="product-card__image-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--neutral-200)" stroke-width="1.5"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
    </div>
  </div>
  <div class="product-card__info">
    <h3 class="product-card__name">{{ displayName }}</h3>
    <p class="product-card__brand">{{ displayBrand }}</p>
    <span class="product-card__cta btn btn-outline btn-sm">{{ i18n.currentLang() === 'es' ? 'Ver producto' : 'View product' }}</span>
  </div>
</a>
