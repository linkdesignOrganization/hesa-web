<!-- DC-144: Timeline starts in pre-animation state; IntersectionObserver in step 4b adds .timeline--animated -->
<div class="timeline timeline--pre-animation" role="list">
  @for (step of steps; track step.number; let i = $index; let last = $last) {
    <div
      class="timeline__step"
      role="listitem"
      [attr.aria-label]="(i18n.currentLang() === 'es' ? 'Paso ' : 'Step ') + step.number + ': ' + i18n.t(step.title)"
      [style.--step-delay]="(i * 200) + 'ms'">

      <div class="timeline__node">
        <span class="timeline__number">{{ step.number }}</span>
      </div>

      @if (!last) {
        <div class="timeline__line" aria-hidden="true"></div>
      }

      <div class="timeline__content">
        <h4 class="timeline__title">{{ i18n.t(step.title) }}</h4>
        <p class="timeline__desc">{{ i18n.t(step.description) }}</p>
      </div>
    </div>
  }
</div>
