<div class="team-card">
  <div class="team-card__photo-wrap">
    @if (photo()) {
      <picture>
        <source [srcset]="photoWebP()" type="image/webp">
        <img
          [src]="photo()"
          [alt]="name()"
          class="team-card__photo"
          loading="lazy" />
      </picture>
    } @else {
      <div class="team-card__placeholder" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--neutral-300)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
    }
  </div>
  <h3 class="team-card__name">{{ name() }}</h3>
  <p class="team-card__title">{{ title() }}</p>
</div>
