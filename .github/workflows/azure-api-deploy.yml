name: HESA API — Build & Deploy to Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - 'api/**'
      - '.github/workflows/azure-api-deploy.yml'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy API

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'api/package-lock.json'

      - name: Install all dependencies (including devDependencies for TypeScript build)
        working-directory: api
        run: npm ci

      - name: Build TypeScript
        working-directory: api
        run: npm run build

      - name: Prepare deployment package (production only)
        run: |
          mkdir -p deploy
          cp -r api/dist deploy/dist
          mkdir -p deploy/public
          cp -r public/Alimentos deploy/public/Alimentos
          cp -r public/farmacos deploy/public/farmacos
          cp -r public/equipo deploy/public/equipo
          cp -r public/brands deploy/public/brands
          cp api/package.json deploy/package.json
          cp api/package-lock.json deploy/package-lock.json
          cd deploy
          npm ci --omit=dev

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hesa-api'
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: 'deploy'
